spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/downloaderdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8081

logging:
  level:
    com.example.downloader: DEBUG

# -------------------------------------------------------
# aria2 download daemon configuration
# -------------------------------------------------------
# Start aria2 with RPC support before using the download manager:
#
#   aria2c --enable-rpc \
#          --rpc-listen-all \
#          --rpc-secret=changeme \
#          --rpc-listen-port=6800 \
#          --continue=true \
#          --max-concurrent-downloads=5
#
# Set ARIA2_RPC_SECRET to the same value used with --rpc-secret.
# If you run aria2 without --rpc-secret (not recommended), leave it empty.
aria2:
  rpc:
    url: ${ARIA2_RPC_URL:http://localhost:6800/jsonrpc}
    secret: ${ARIA2_RPC_SECRET:}
