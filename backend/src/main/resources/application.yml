spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/shopdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:changeme_replace_with_a_very_long_random_base64_encoded_key_256bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours

logging:
  level:
    com.example.shop: DEBUG
    org.springframework.security: DEBUG
